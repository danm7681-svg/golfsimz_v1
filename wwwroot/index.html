<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GolfSim</title>
    <base href="/" />
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; background-color: #111; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="app">
        <div style="color: white; font-family: sans-serif; text-align: center; margin-top: 200px; font-size: 18px;">
            Initializing Trackman Simulator Environment...
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, line;
        
        window.init3DTracer = (canvasId) => {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            
            scene = new THREE.Scene();
            // Deep sky background color
            scene.background = new THREE.Color(0x0a141d);
            
            camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 1, 1000);
            camera.position.set(0, 12, -35);
            camera.lookAt(0, 8, 120);
            
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            
            // 1. THE BIG GREEN GRASS FLOOR (Flat unlit material, guaranteed to show)
            const grassGeo = new THREE.PlaneGeometry(800, 1000);
            const grassMat = new THREE.MeshBasicMaterial({ color: 0x1b431e });
            const grassField = new THREE.Mesh(grassGeo, grassMat);
            grassField.rotation.x = -Math.PI / 2; // Flat on the floor
            grassField.position.set(0, -0.5, 250);
            scene.add(grassField);

            // 2. RANGE GRID LINES
            const gridHelper = new THREE.GridHelper(600, 60, 0x33663bb, 0x274d2d);
            gridHelper.position.set(0, -0.4, 250);
            scene.add(gridHelper);

            // 3. GENERATE THE BACKDROP TREES
            // Simple loop placing flat-colored primitive trees down the sides and back
            const trunkMat = new THREE.MeshBasicMaterial({ color: 0x422811 });
            const leavesMat = new THREE.MeshBasicMaterial({ color: 0x113315 });

            // Back Row Woods (at 280 yards deep)
            for (let x = -120; x <= 120; x += 15) {
                createSingleTree(x, 280, trunkMat, leavesMat);
                // Extra layer of depth behind them
                createSingleTree(x + 7, 295, trunkMat, leavesMat);
            }

            // Side Boundary Tree Lines
            for (let z = 60; z < 260; z += 40) {
                createSingleTree(-75, z, trunkMat, leavesMat); // Left boundary
                createSingleTree(75, z, trunkMat, leavesMat);  // Right boundary
            }
            
            renderer.render(scene, camera);
        };

        // Simplified Tree Assembler
        function createSingleTree(x, z, trunkMat, leavesMat) {
            // Trunk cylinder
            const trunkGeo = new THREE.CylinderGeometry(0.5, 0.5, 6, 4);
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.set(x, 3, z);
            scene.add(trunk);

            // Foliage cone
            const coneGeo = new THREE.ConeGeometry(4, 9, 4);
            const leaves = new THREE.Mesh(coneGeo, leavesMat);
            leaves.position.set(x, 9, z);
            scene.add(leaves);
        }

        window.update3DTracer = (pointsJson) => {
            if (!scene) return;
            if (line) scene.remove(line);
            
            const points = JSON.parse(pointsJson);
            const threePoints = [];
            
            points.forEach(p => {
                threePoints.push(new THREE.Vector3(p.OfflineYds, p.AltitudeFt / 3.28084, p.DownrangeYds));
            });
            
            const geometry = new THREE.BufferGeometry().setFromPoints(threePoints);
            const material = new THREE.LineBasicMaterial({ color: 0xff8c00, linewidth: 6 }); 
            
            line = new THREE.Line(geometry, material);
            scene.add(line);
            renderer.render(scene, camera);
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
