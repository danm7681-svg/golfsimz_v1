<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="description" content="Portable Golf Launch Monitor - Physics Engine Simulator">
    
    <title>Golfsimz V1 - Launch Monitor</title>
    
    <!-- Base URL (required for Blazor) -->
    <base href="/" />
    
    <!-- App CSS -->
    <link rel="stylesheet" href="css/app.css">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛳</text></svg>">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛳</text></svg>">
    
    <style>
        /* Loading screen before Blazor boots */
        #blazor-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease-out;
        }
        
        #blazor-loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(0, 212, 255, 0.15);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 1.5rem;
            color: #8888aa;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <!-- Loading indicator (shown until Blazor initializes) -->
    <div id="blazor-loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">LOADING ENGINE</div>
    </div>

    <!-- Blazor root component -->
    <div id="app">
        <!-- Blazor will render here -->
    </div>

    <!-- Blazor WebAssembly runtime -->
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    
    <!-- Visualization scripts -->
    <script type="module" src="js/trajectoryPlot.js"></script>
    
    <!-- Hide loading screen when Blazor is ready -->
    <script>
        Blazor.start().then(function () {
            const loading = document.getElementById('blazor-loading');
            if (loading) {
                loading.classList.add('hidden');
                setTimeout(function () {
                    loading.remove();
                }, 500);
            }
        });
    </script>
</body>
</html>
