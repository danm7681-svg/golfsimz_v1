<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GolfSim</title>
    <base href="/" />
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; background-color: #111; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="app">
        <div style="color: white; font-family: sans-serif; text-align: center; margin-top: 200px; font-size: 18px;">
            Initializing Trackman Simulator Environment...
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, line;
        
        window.init3DTracer = (canvasId) => {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a141d); // Deep sky background color
            
            camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 1, 1000);
            camera.position.set(0, 12, -35);
            camera.lookAt(0, 5, 150);
            
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            
            // 1. FIXED GRASS FLOOR
            // Making it a massive square centered right over the origin, so it is guaranteed to be under the camera
            const grassGeo = new THREE.PlaneGeometry(1000, 1000);
            // MeshBasicMaterial does NOT need lights to show its color
            const grassMat = new THREE.MeshBasicMaterial({ color: 0x143317, side: THREE.DoubleSide }); 
            const grassField = new THREE.Mesh(grassGeo, grassMat);
            
            grassField.rotation.x = Math.PI / 2; // Flatten flat on ground level
            grassField.position.set(0, 0, 400);  // Shift it forward down the range
            scene.add(grassField);

            // 2. RANGE GRID LINES
            // Placed slightly above the grass (y = 0.05) so they don't blend together or glitch out
            const gridHelper = new THREE.GridHelper(800, 80, 0x33663b, 0x224428);
            gridHelper.position.set(0, 0.05, 400);
            gridHelper.rotation.x = 0;
            scene.add(gridHelper);

            // 3. TREE GENERATION WITH BASIC MATERIALS (Guaranteed visible without complex lighting setup)
            const trunkMat = new THREE.MeshBasicMaterial({ color: 0x3d2510 });
            const leavesMat = new THREE.MeshBasicMaterial({ color: 0x0d2911 });

            // Back Row woods at 300 yards deep
            for (let x = -150; x <= 150; x += 20) {
                createSingleTree(x, 300, trunkMat, leavesMat);
                createSingleTree(x + 10, 320, trunkMat, leavesMat);
            }

            // Left and Right Side boundary tree rows flanking the grid
            for (let z = 40; z < 300; z += 40) {
                createSingleTree(-80, z, trunkMat, leavesMat); // Left boundary line
                createSingleTree(80, z, trunkMat, leavesMat);  // Right boundary line
            }
            
            renderer.render(scene, camera);
        };

        function createSingleTree(x, z, trunkMat, leavesMat) {
            // Trunk cylinder
            const trunkGeo = new THREE.CylinderGeometry(0.6, 0.6, 7, 4);
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.set(x, 3.5, z); // shift up so base sits on y=0
            scene.add(trunk);

            // Foliage cone
            const coneGeo = new THREE.ConeGeometry(5, 12, 4);
            const leaves = new THREE.Mesh(coneGeo, leavesMat);
            leaves.position.set(x, 11, z); // stack on top of trunk
            scene.add(leaves);
        }

        window.update3DTracer = (pointsJson) => {
            if (!scene) return;
            if (line) scene.remove(line);
            
            const points = JSON.parse(pointsJson);
            const threePoints = [];
            
            points.forEach(p => {
                threePoints.push(new THREE.Vector3(p.OfflineYds, (p.AltitudeFt / 3.28084) + 0.1, p.DownrangeYds));
            });
            
            const geometry = new THREE.BufferGeometry().setFromPoints(threePoints);
            const material = new THREE.LineBasicMaterial({ color: 0xff8c00, linewidth: 6 }); 
            
            line = new THREE.Line(geometry, material);
            scene.add(line);
            renderer.render(scene, camera);
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
