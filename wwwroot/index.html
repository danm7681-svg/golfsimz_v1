<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GolfSim</title>
    <base href="/" />

    <link href="css/app.css" rel="stylesheet" />
    <style>
        html, body { margin:0; padding:0; overflow:hidden; background:#111; width:100%; height:100%; }
        #threeCanvas { width:100% !important; height:100% !important; display:block; background:#0a0a1a; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div id="app">Loading...</div>

<script>
    let scene, camera, renderer, controls, line, ballMesh;
    let isBackgroundLoaded = false;

    function createFlag(x, z, color) {
        const pole = new THREE.Mesh(
            new THREE.CylinderGeometry(0.05, 0.05, 3, 4),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        pole.position.set(x, 1.5, z);
        scene.add(pole);

        const flag = new THREE.Mesh(
            new THREE.PlaneGeometry(0.6, 0.8),
            new THREE.MeshBasicMaterial({ color: color, side: THREE.DoubleSide })
        );
        flag.position.set(x + 0.3, 3, z);
        scene.add(flag);

        const circle = new THREE.Mesh(
            new THREE.RingGeometry(1.5, 2, 20),
            new THREE.MeshBasicMaterial({ color: 0xffaa00, side: THREE.DoubleSide })
        );
        circle.rotation.x = -Math.PI / 2;
        circle.position.set(x, 0.01, z);
        scene.add(circle);
    }
        function loadLocalBackground() {
            const textureLoader = new THREE.TextureLoader();

            // This loads the .jpg and assigns it to the scene
            textureLoader.load('/images/range.jpg', function(texture) {
                // This ensures the image stretches correctly to the background
                texture.mapping = THREE.EquirectangularReflectionMapping;
                scene.background = texture;

                // CRITICAL: Re-render the scene once the image is loaded
                renderer.render(scene, camera);
            }, undefined, function(err) {
                console.error('Error loading background:', err);
                // Fallback if the image doesn't load
                scene.background = new THREE.Color(0x87CEEB);
                renderer.render(scene, camera);
            });
        }
        // ---- Scene elements ----
        createFlag(0, 50, 0xff0000);
        createFlag(0, 100, 0x00ff00);
        createFlag(0, 150, 0x0000ff);
        createFlag(0, 200, 0xffaa00);

        const teeMat = new THREE.Mesh(
            new THREE.BoxGeometry(2, 0.1, 3),
            new THREE.MeshLambertMaterial({ color: 0x1a3a1a })
        );
        teeMat.position.set(0, 0, 0);
        scene.add(teeMat);

        const ambient = new THREE.AmbientLight(0x404060, 0.4);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 0.6);
        sun.position.set(30, 50, 20);
        sun.castShadow = true;
        scene.add(sun);

        const originSphere = new THREE.Mesh(
            new THREE.SphereGeometry(0.3, 8, 8),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        originSphere.position.set(0, 0.3, 0);
        scene.add(originSphere);

        renderer.render(scene, camera);
        console.log('Scene initialized');
    };
    
    };
    // ---- drawBirdseye ----
    window.drawBirdseye = function(canvasId, pointsJson) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#2d8a4e';
        ctx.fillRect(0, 0, w, h);

        try {
            const points = JSON.parse(pointsJson);
            if (!points || points.length === 0) {
                ctx.fillStyle = '#ffffff';
                ctx.font = '12px sans-serif';
                ctx.fillText('No data', w/2-25, h/2);
                return;
            }
            const maxZ = Math.max.apply(null, points.map(p => p.DownrangeYds)) || 1;
            ctx.fillStyle = '#1a3a1a';
            ctx.fillRect(0, h/2-20, w, 40);
            ctx.strokeStyle = '#00fff7';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (var i = 0; i < points.length; i++) {
                var x = (points[i].OfflineYds / maxZ) * w/2 + w/2;
                var y = (points[i].DownrangeYds / maxZ) * h/2 + h/2;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            var last = points[points.length - 1];
            var bx = (last.OfflineYds / maxZ) * w/2 + w/2;
            var by = (last.DownrangeYds / maxZ) * h/2 + h/2;
            ctx.beginPath();
            ctx.arc(bx, by, 5, 0, 2 * Math.PI);
            ctx.fillStyle = '#00fff7';
            ctx.fill();
        } catch(e) {
            console.error('drawBirdseye error:', e);
        }
    };
</script>

<style>
    .birdseye-overlay {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 320px;
        height: 420px;
        border-radius: 12px;
        border: 2px solid #2a2a4a;
        overflow: hidden;
        background: #0a0a1a;
        box-shadow: 0 4px 24px rgba(0,0,0,0.9);
        z-index: 10;
    }

    .birdseye-overlay canvas {
        width: 100%;
        height: 100%;
        display: block;
    }
</style>

<script src="js/tracer.js"></script>

<script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
