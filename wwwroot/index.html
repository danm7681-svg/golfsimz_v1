<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GolfSim</title>
    <base href="/" />
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; background-color: #111; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="app">
        <div style="color: white; font-family: sans-serif; text-align: center; margin-top: 200px; font-size: 18px;">
            Initializing Trackman Simulator Environment...
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, line;
        
        window.init3DTracer = (canvasId) => {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            
            scene = new THREE.Scene();
            // Deep sky blue/dark evening mix
            scene.background = new THREE.Color(0x0a0f1d);
            
            camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 1, 1000);
            camera.position.set(0, 12, -35);
            camera.lookAt(0, 8, 120);
            
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            
            // 1. ADD THE GRASS FIELD
            // Creates a massive horizontal plane to act as the grass turf flooring
            const grassGeo = new THREE.PlaneGeometry(300, 600);
            const grassMat = new THREE.MeshLambertMaterial({ 
                color: 0x1e3f20, // Premium Fairway Green
                side: THREE.DoubleSide 
            });
            const grassField = new THREE.Mesh(grassGeo, grassMat);
            grassField.rotation.x = -Math.PI / 2; // Lay it flat down
            grassField.position.set(0, -0.05, 250); // Slightly below the grid lines to prevent glitching
            scene.add(grassField);

            // Grid Fairway Overlay Lines (for targeting depth)
            const gridHelper = new THREE.GridHelper(400, 40, 0x335c3a, 0x224427);
            gridHelper.position.set(0, 0, 200);
            scene.add(gridHelper);

            // ENVIRONMENT LIGHTING (Brings out 3D textures/shadows)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
            scene.add(ambientLight);
            
            const sunLight = new THREE.DirectionalLight(0xffffff, 0.5);
            sunLight.position.set(40, 60, -20);
            scene.add(sunLight);

            // 2. GENERATE FOREST BACKDROP
            createDenseForest();
            
            renderer.render(scene, camera);
        };

        // Realistic Procedural 3D Tree Builder
        function buildTree(x, z) {
            const treeGroup = new THREE.Group();

            // Varying scale so every tree looks custom and unique
            const heightScale = 0.85 + Math.random() * 0.4;

            // Trunk Structure
            const trunkGeo = new THREE.CylinderGeometry(0.3, 0.5, 6 * heightScale, 6);
            const trunkMat = new THREE.MeshLambertMaterial({ color: 0x4a3319 }); // Bark Brown
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = (6 * heightScale) / 2;
            treeGroup.add(trunk);

            // Layered Canopy Foliage (Pine Tree Style)
            const leafMat = new THREE.MeshLambertMaterial({ color: 0x1b4d22 }); // Forest Green
            
            const layers = 3;
            for(let i = 0; i < layers; i++) {
                const radius = 3.5 - (i * 0.9);
                const height = 4.5 - (i * 0.5);
                const coneGeo = new THREE.ConeGeometry(radius, height, 6);
                const cone = new THREE.Mesh(coneGeo, leafMat);
                
                // Stack each green canopy layer sequentially up the trunk
                cone.position.y = (5 * heightScale) + (i * 2.5 * heightScale);
                treeGroup.add(cone);
            }

            treeGroup.position.set(x, 0, z);
            scene.add(treeGroup);
        }

        function createDenseForest() {
            // Plant a deep wall of trees along the back boundary (260 - 320 yards deep)
            // Left to Right row
            for (let x = -100; x <= 100; x += 10) {
                // Row 1 (Main Backdrop Line)
                let randX = x + (Math.random() - 0.5) * 5;
                let randZ = 270 + (Math.random() - 0.5) * 8;
                buildTree(randX, randZ);

                // Row 2 (Denser Rear Filling row to block out the horizon completely)
                if (Math.random() > 0.3) {
                    buildTree(randX + 5, randZ + 15);
                }
            }

            // Plant Side Boundary Trees (Flanking Left and Right options down the driving range)
            for (let z = 100; z < 260; z += 25) {
                buildTree(-65 + (Math.random() - 0.5) * 6, z); // Left Tree line
                buildTree(65 + (Math.random() - 0.5) * 6, z);  // Right Tree line
            }
        }

        window.update3DTracer = (pointsJson) => {
            if (!scene) return;
            if (line) scene.remove(line);
            
            const points = JSON.parse(pointsJson);
            const threePoints = [];
            
            points.forEach(p => {
                threePoints.push(new THREE.Vector3(p.OfflineYds, p.AltitudeFt / 3.28084, p.DownrangeYds));
            });
            
            const geometry = new THREE.BufferGeometry().setFromPoints(threePoints);
            const material = new THREE.LineBasicMaterial({ color: 0xff8c00, linewidth: 5 }); // Vibrant Trackman Orange Tracer
            
            line = new THREE.Line(geometry, material);
            scene.add(line);
            renderer.render(scene, camera);
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
