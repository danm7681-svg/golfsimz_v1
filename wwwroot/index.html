<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GolfSim</title>
    <base href="/" />
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; background-color: #111; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="app">
        <div style="color: white; font-family: sans-serif; text-align: center; margin-top: 200px; font-size: 18px;">
            Initializing Trackman Simulator Environment...
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, line;
        
        window.init3DTracer = (canvasId) => {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            
            scene = new THREE.Scene();
            // Deep sky night mix background color
            scene.background = new THREE.Color(0x0a0f1d);
            
            camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 1, 1000);
            camera.position.set(0, 12, -35);
            camera.lookAt(0, 8, 120);
            
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            
            // 1. FIXED GRASS FIELD (Using MeshBasicMaterial so color always shows up)
            const grassGeo = new THREE.PlaneGeometry(600, 800);
            const grassMat = new THREE.MeshBasicMaterial({ 
                color: 0x143316, // Rich Deep Fairway Green 
                side: THREE.DoubleSide 
            });
            const grassField = new THREE.Mesh(grassGeo, grassMat);
            grassField.rotation.x = -Math.PI / 2; // Flatten it completely
            grassField.position.set(0, -0.2, 200); // Sit it safely below grid lines
            scene.add(grassField);

            // Grid Fairway Overlay Lines
            const gridHelper = new THREE.GridHelper(500, 50, 0x225427, 0x1b421f);
            gridHelper.position.set(0, -0.1, 200);
            scene.add(gridHelper);

            // ENVIRONMENT LIGHTING (Brings out 3D tree shapes)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            
            const sunLight = new THREE.DirectionalLight(0xffffff, 0.5);
            sunLight.position.set(0, 50, 50);
            scene.add(sunLight);

            // 2. GENERATE FOREST BACKDROP
            createDenseForest();
            
            renderer.render(scene, camera);
        };

        // 3D Tree Builder
        function buildTree(x, z) {
            const treeGroup = new THREE.Group();
            const heightScale = 0.85 + Math.random() * 0.4;

            // Trunk Structure
            const trunkGeo = new THREE.CylinderGeometry(0.4, 0.6, 6 * heightScale, 5);
            const trunkMat = new THREE.MeshLambertMaterial({ color: 0x4a3319 }); 
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = (6 * heightScale) / 2;
            treeGroup.add(trunk);

            // Layered Canopy Foliage (Stacked Pines)
            const leafMat = new THREE.MeshLambertMaterial({ color: 0x0f2e14 }); 
            
            const layers = 3;
            for(let i = 0; i < layers; i++) {
                const radius = 4.0 - (i * 1.1);
                const height = 5.0 - (i * 0.6);
                const coneGeo = new THREE.ConeGeometry(radius, height, 5);
                const cone = new THREE.Mesh(coneGeo, leafMat);
                
                cone.position.y = (5 * heightScale) + (i * 2.8 * heightScale);
                treeGroup.add(cone);
            }

            treeGroup.position.set(x, 0, z);
            scene.add(treeGroup);
        }

        function createDenseForest() {
            // Back wall backdrop trees (at 280-340 yards out)
            for (let x = -150; x <= 150; x += 14) {
                let randX = x + (Math.random() - 0.5) * 6;
                let randZ = 290 + (Math.random() - 0.5) * 10;
                buildTree(randX, randZ);

                if (Math.random() > 0.2) {
                    buildTree(randX + 7, randZ + 18);
                }
            }

            // Flanking Side boundary border lines
            for (let z = 60; z < 280; z += 30) {
                buildTree(-80 + (Math.random() - 0.5) * 8, z); // Left border
                buildTree(80 + (Math.random() - 0.5) * 8, z);  // Right border
            }
        }

        window.update3DTracer = (pointsJson) => {
            if (!scene) return;
            if (line) scene.remove(line);
            
            const points = JSON.parse(pointsJson);
            const threePoints = [];
            
            points.forEach(p => {
                threePoints.push(new THREE.Vector3(p.OfflineYds, p.AltitudeFt / 3.28084, p.DownrangeYds));
            });
            
            const geometry = new THREE.BufferGeometry().setFromPoints(threePoints);
            const material = new THREE.LineBasicMaterial({ color: 0xff8c00, linewidth: 6 }); 
            
            line = new THREE.Line(geometry, material);
            scene.add(line);
            renderer.render(scene, camera);
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
